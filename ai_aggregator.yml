name: AIAggregator
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  AIAggregator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIAggregator
        excludes:
          - "**/*.md"
    info:
      path: AIAggregator/App/Info.plist
      properties:
        CFBundleDisplayName: "AI 聚合"
        CFBundleIdentifier: com.yourname.AIAggregator
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.AIAggregator
        INFOPLIST_FILE: AIAggregator/App/Info.plist
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    dependencies:
      - framework: WebKit.framework
        embed: false
