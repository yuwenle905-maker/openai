name: AIAggregator
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  AIAggregator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIAggregator
        excludes:
          - "**/*.md"
          - "**/*.plist"   # Info.plist 由 info.path 单独管理，避免被二次收录为源文件
    info:
      path: AIAggregator/App/Info.plist   # XcodeGen 读取此文件，自动设置 INFOPLIST_FILE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuwenle905maker.ai-aggregator
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        # 不再手写 INFOPLIST_FILE，由上方 info.path 自动注入
    dependencies:
      - sdk: WebKit.framework    # 系统 SDK 框架必须用 sdk:，不能用 framework:
