name: Build CRMApp TrollStore IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build CRMApp.ipa
    runs-on: macos-15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode 16 ────────────────────────────────────────────────
      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      # ── 3. Install XcodeGen ────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 4. Generate .xcodeproj from project.yml ───────────────────────────
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          echo "=== objectVersion ==="
          grep -m1 "objectVersion" CRMApp.xcodeproj/project.pbxproj
          echo "=== Project structure ==="
          find CRMApp.xcodeproj -type f | sort

      # ── 5. Detect iOS SDK ─────────────────────────────────────────────────
      - name: Detect iOS SDK
        run: |
          SDK=$(xcodebuild -showsdks 2>/dev/null | grep iphoneos | tail -1 | awk '{print $NF}')
          if [ -z "$SDK" ]; then
            SDK=$(ls -d /Applications/Xcode*.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS*.sdk 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using SDK: $SDK"
          echo "IOS_SDK=$SDK" >> "$GITHUB_ENV"
          xcodebuild -showsdks

      # ── 6. List schemes (diagnostic) ──────────────────────────────────────
      - name: List schemes
        run: xcodebuild -project CRMApp.xcodeproj -list

      # ── 7. Build (unsigned, arm64 device slice) ───────────────────────────
      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project CRMApp.xcodeproj \
            -scheme CRMApp \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build/Release-iphoneos" \
            clean build \
            2>&1 | tee build.log; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "========== LAST 100 LINES OF BUILD LOG =========="
            tail -100 build.log
            exit $EXIT
          fi

      # ── 8. Upload build log (always) ──────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # ── 9. Verify .app was produced ───────────────────────────────────────
      - name: Verify build output
        run: |
          APP_PATH="${{ github.workspace }}/build/Release-iphoneos/CRMApp.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: CRMApp.app not found"
            ls -la "${{ github.workspace }}/build/Release-iphoneos/" || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found: $APP_PATH"

      # ── 10. Package as TrollStore-compatible .ipa ─────────────────────────
      - name: Package as TrollStore IPA
        run: |
          cd "${{ github.workspace }}/build/Release-iphoneos"
          mkdir -p Payload
          cp -R CRMApp.app Payload/
          zip -r "${{ github.workspace }}/CRMApp.ipa" Payload
          echo "IPA size: $(du -sh "${{ github.workspace }}/CRMApp.ipa" | cut -f1)"

      # ── 11. Upload IPA artifact ───────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CRMApp-TrollStore
          path: CRMApp.ipa
          retention-days: 30
          if-no-files-found: error
