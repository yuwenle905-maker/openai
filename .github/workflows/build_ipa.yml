name: Build TrollStore IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build PrivacyDiary.ipa
    runs-on: macos-15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode 16 (default on macos-15) ──────────────────────────
      - name: Select Xcode 16
        run: |
          # macos-15 ships Xcode 16 as default; confirm and use it
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      # ── 3. Install XcodeGen ────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 3b. Pre-generate fish app icon ───────────────────────────────────
      # actool crashes in CI without simulator runtimes, so we skip the asset
      # catalog entirely and inject the icon PNG directly after build.
      - name: Generate fish app icon
        run: |
          python3 gen_icon.py
          ls -lh AppIcon-1024.png

      # ── 4. Generate .xcodeproj ────────────────────────────────────────────
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          echo "=== Project objectVersion ==="
          grep -m1 "objectVersion" PrivacyDiary.xcodeproj/project.pbxproj
          echo "=== Generated project structure ==="
          find PrivacyDiary.xcodeproj -type f | sort

      # ── 5. Show available schemes & SDKs (diagnostic) ─────────────────────
      - name: List schemes and SDKs
        run: |
          xcodebuild -project PrivacyDiary.xcodeproj -list
          xcodebuild -showsdks

      # ── 6. Build (unsigned, arm64 device slice) ───────────────────────────
      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project PrivacyDiary.xcodeproj \
            -scheme PrivacyDiary \
            -configuration Release \
            -destination "generic/platform=iOS" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build/Release-iphoneos" \
            clean build \
            2>&1 | tee build.log; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "========== LAST 100 LINES OF BUILD LOG =========="
            tail -100 build.log
            exit $EXIT
          fi

      # ── 7. Upload full build log (always, for inspection) ─────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # ── 8. Verify .app was produced ────────────────────────────────────────
      - name: Verify build output
        run: |
          APP_PATH="${{ github.workspace }}/build/Release-iphoneos/PrivacyDiary.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: PrivacyDiary.app not found"
            ls -la "${{ github.workspace }}/build/Release-iphoneos/" || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found: $APP_PATH"

      # ── 8b. Inject app icon directly into .app bundle ─────────────────────
      # Bypasses actool/asset catalog which requires simulator runtimes in CI.
      - name: Inject app icon
        run: |
          APP="${{ github.workspace }}/build/Release-iphoneos/PrivacyDiary.app"
          # Resize 1024→60@2x(120), 60@3x(180), 76@2x(152) using sips
          sips -z 120 120 AppIcon-1024.png --out "$APP/AppIcon60x60@2x.png"
          sips -z 180 180 AppIcon-1024.png --out "$APP/AppIcon60x60@3x.png"
          sips -z 152 152 AppIcon-1024.png --out "$APP/AppIcon76x76@2x~ipad.png"
          sips -z 1024 1024 AppIcon-1024.png --out "$APP/AppIcon-1024.png"
          echo "Icons injected into $APP"

      # ── 9. Package as TrollStore-compatible .ipa ──────────────────────────
      - name: Package as TrollStore IPA
        run: |
          cd "${{ github.workspace }}/build/Release-iphoneos"
          mkdir -p Payload
          cp -R PrivacyDiary.app Payload/
          zip -r "${{ github.workspace }}/PrivacyDiary.ipa" Payload
          echo "IPA size: $(du -sh "${{ github.workspace }}/PrivacyDiary.ipa" | cut -f1)"

      # ── 10. Upload IPA artifact ────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivacyDiary-TrollStore
          path: PrivacyDiary.ipa
          retention-days: 30
          if-no-files-found: error
