name: Build AIAggregator TrollStore IPA

on:
  push:
    branches: [ main, master ]
    paths:
      - 'AIAggregator/**'
      - 'ai_aggregator.yml'
      - '.github/workflows/build_ai_aggregator.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'AIAggregator/**'
  workflow_dispatch:

jobs:
  build:
    name: Build AIAggregator.ipa
    runs-on: macos-15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode 16 ──────────────────────────────────────────────────
      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      # ── 3. Diagnostics ──────────────────────────────────────────────────────
      - name: Show available SDKs
        run: xcodebuild -showsdks

      # ── 4. Install XcodeGen ─────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 5. Generate .xcodeproj ──────────────────────────────────────────────
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec ai_aggregator.yml
          echo "=== objectVersion ==="
          grep -m1 "objectVersion" AIAggregator.xcodeproj/project.pbxproj
          echo "=== Schemes ==="
          xcodebuild -project AIAggregator.xcodeproj -list

      # ── 6. Build (unsigned arm64 device binary) ──────────────────────────────
      - name: Build app
        run: |
          set -o pipefail
          SDK=$(xcodebuild -showsdks | grep -oE 'iphoneos[0-9.]+' | sort -V | tail -1)
          echo "Using SDK: $SDK"
          xcodebuild \
            -project AIAggregator.xcodeproj \
            -scheme AIAggregator \
            -configuration Release \
            -sdk "$SDK" \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build/Release-iphoneos" \
            build \
            2>&1 | tee build_ai.log; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "========== LAST 150 LINES OF BUILD LOG =========="
            tail -150 build_ai.log
            exit $EXIT
          fi

      # ── 7. Upload build log ──────────────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-aggregator-build-log
          path: build_ai.log
          retention-days: 7

      # ── 8. Verify .app exists ───────────────────────────────────────────────
      - name: Verify build output
        run: |
          APP_PATH="${{ github.workspace }}/build/Release-iphoneos/AIAggregator.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: AIAggregator.app not found"
            ls -la "${{ github.workspace }}/build/Release-iphoneos/" || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found: $APP_PATH"

      # ── 9. Package as TrollStore-compatible .ipa ────────────────────────────
      - name: Package as TrollStore IPA
        run: |
          cd "${{ github.workspace }}/build/Release-iphoneos"
          mkdir -p Payload
          cp -R AIAggregator.app Payload/
          zip -r "${{ github.workspace }}/AIAggregator.ipa" Payload
          echo "IPA size: $(du -sh "${{ github.workspace }}/AIAggregator.ipa" | cut -f1)"

      # ── 10. Upload IPA artifact ─────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIAggregator-TrollStore
          path: AIAggregator.ipa
          retention-days: 30
          if-no-files-found: error
