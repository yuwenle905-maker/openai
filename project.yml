# XcodeGen project spec — iOS 私域 CRM (TrollStore 免签版)
# 生成命令: xcodegen generate --spec project.yml

name: CRMApp
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.yourname.PrivateCRM
    PRODUCT_NAME: CRMApp
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    AD_HOC_CODE_SIGNING_ALLOWED: YES
    ARCHS: arm64
    VALID_ARCHS: arm64
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: arm64
    SUPPORTS_MACCATALYST: NO
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  CRMApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: CRMApp
        excludes:
          - Info.plist
    info:
      path: CRMApp/Info.plist
      properties:
        CFBundleName: 私域CRM
        CFBundleDisplayName: 私域 CRM
        CFBundleIdentifier: com.yourname.PrivateCRM
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSFaceIDUsageDescription: 使用 Face ID 快速安全地解锁 CRM 数据
        UILaunchScreen: {}
    settings:
      base:
        INFOPLIST_FILE: CRMApp/Info.plist
        SDKROOT: iphoneos
    dependencies: []

schemes:
  CRMApp:
    build:
      targets:
        CRMApp: all
      buildImplicitDependencies: true
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
